<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" role="img" aria-labelledby="avps-title avps-desc" font-family="'Helvetica Neue', Arial, sans-serif">
  <title id="avps-title">How bithost anonymizes DigitalOcean, Vultr and Linode VPS hosting</title>
  <desc id="avps-desc">A three-step flow diagram. You pay bithost in cryptocurrency with only an email — no KYC and no credit card. bithost acts as a privacy layer that holds the provider account and deploys your server on DigitalOcean, Vultr or Linode, so the provider never receives your identity. You keep full root access to the server over SSH.</desc>

  <defs>
    <marker id="avps-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4f64e1"/>
    </marker>
    <marker id="avps-arrow-mute" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a8c99"/>
    </marker>
  </defs>

  <!-- Caption strip -->
  <text x="500" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#0e1124">The provider never sees your identity</text>
  <text x="500" y="60" text-anchor="middle" font-size="12.5" fill="#6b6d7f">bithost sits in front of DigitalOcean, Vultr and Linode as an anonymous payment layer</text>

  <!-- CARD A: You -->
  <rect x="20" y="92" width="200" height="156" rx="14" fill="#ffffff" stroke="rgba(14,17,36,0.12)" stroke-width="1.5"/>
  <circle cx="120" cy="138" r="17" fill="none" stroke="#0e1124" stroke-width="2.2"/>
  <path d="M99 176 a21 21 0 0 1 42 0" fill="none" stroke="#0e1124" stroke-width="2.2" stroke-linecap="round"/>
  <text x="120" y="212" text-anchor="middle" font-size="19" font-weight="700" fill="#0e1124">You</text>
  <text x="120" y="234" text-anchor="middle" font-size="12.5" fill="#6b6d7f">email + crypto only</text>

  <!-- CARD B: bithost (privacy layer, emphasised) -->
  <rect x="400" y="74" width="200" height="192" rx="14" fill="#ececfe" stroke="#4f64e1" stroke-width="2"/>
  <path d="M500 104 l26 9 v20 c0 17 -11 30 -26 36 c-15 -6 -26 -19 -26 -36 v-20 Z" fill="none" stroke="#4f64e1" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M490 139 l7 7 l14 -15" fill="none" stroke="#4f64e1" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="500" y="206" text-anchor="middle" font-size="19" font-weight="700" fill="#0e1124">bithost</text>
  <text x="500" y="228" text-anchor="middle" font-size="12.5" fill="#4040d8">privacy layer · no KYC</text>
  <text x="500" y="246" text-anchor="middle" font-size="12.5" fill="#4040d8">holds the provider account</text>

  <!-- CARD C: Providers -->
  <rect x="780" y="92" width="200" height="156" rx="14" fill="#ffffff" stroke="rgba(14,17,36,0.12)" stroke-width="1.5"/>
  <rect x="850" y="118" width="60" height="15" rx="3.5" fill="none" stroke="#0e1124" stroke-width="2"/>
  <rect x="850" y="138" width="60" height="15" rx="3.5" fill="none" stroke="#0e1124" stroke-width="2"/>
  <rect x="850" y="158" width="60" height="15" rx="3.5" fill="none" stroke="#0e1124" stroke-width="2"/>
  <circle cx="859" cy="125.5" r="2" fill="#0e1124"/>
  <circle cx="859" cy="145.5" r="2" fill="#0e1124"/>
  <circle cx="859" cy="165.5" r="2" fill="#0e1124"/>
  <text x="880" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#0e1124">Providers</text>
  <text x="880" y="222" text-anchor="middle" font-size="12" fill="#6b6d7f">DigitalOcean · Vultr</text>
  <text x="880" y="239" text-anchor="middle" font-size="12" fill="#6b6d7f">· Linode</text>

  <!-- Arrow A -> B -->
  <text x="310" y="154" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4f64e1">pays in crypto</text>
  <line x1="222" y1="168" x2="394" y2="168" stroke="#4f64e1" stroke-width="2.2" marker-end="url(#avps-arrow)"/>

  <!-- Arrow B -> C -->
  <text x="690" y="154" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4f64e1">deploys &amp; manages</text>
  <line x1="602" y1="168" x2="774" y2="168" stroke="#4f64e1" stroke-width="2.2" marker-end="url(#avps-arrow)"/>

  <!-- Return arrow B -> A : root access -->
  <text x="360" y="314" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b6d7f">full root access over SSH</text>
  <path d="M500 272 q-140 54 -278 -8" fill="none" stroke="#8a8c99" stroke-width="1.8" stroke-dasharray="5 5" marker-end="url(#avps-arrow-mute)"/>
</svg>
