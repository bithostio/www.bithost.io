<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" role="img" aria-labelledby="wg-title wg-desc" font-family="'Helvetica Neue', Arial, sans-serif">
  <title id="wg-title">How a self-hosted WireGuard VPN routes your traffic through your VPS</title>
  <desc id="wg-desc">A flow diagram. Your device connects through an encrypted WireGuard tunnel to your own VPS running WireGuard. The VPS then forwards your traffic to the internet, so websites see the server's IP address instead of yours.</desc>

  <defs>
    <marker id="wg-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4f64e1"/>
    </marker>
    <marker id="wg-arrow-mute" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a8c99"/>
    </marker>
  </defs>

  <!-- Caption -->
  <text x="500" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#0e1124">Your traffic exits from your VPS, not your device</text>
  <text x="500" y="60" text-anchor="middle" font-size="12.5" fill="#6b6d7f">an encrypted WireGuard tunnel carries everything to a server you control</text>

  <!-- CARD A: Your device -->
  <rect x="20" y="96" width="210" height="150" rx="14" fill="#ffffff" stroke="rgba(14,17,36,0.12)" stroke-width="1.5"/>
  <rect x="95" y="122" width="60" height="40" rx="5" fill="none" stroke="#0e1124" stroke-width="2.2"/>
  <line x1="108" y1="170" x2="142" y2="170" stroke="#0e1124" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="125" y1="162" x2="125" y2="170" stroke="#0e1124" stroke-width="2.2"/>
  <text x="125" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#0e1124">Your device</text>
  <text x="125" y="222" text-anchor="middle" font-size="12" fill="#6b6d7f">phone or laptop</text>

  <!-- CARD B: VPS (WireGuard) -->
  <rect x="395" y="84" width="210" height="174" rx="14" fill="#ececfe" stroke="#4f64e1" stroke-width="2"/>
  <path d="M500 108 l24 8 v18 c0 16 -10 28 -24 33 c-14 -5 -24 -17 -24 -33 v-18 Z" fill="none" stroke="#4f64e1" stroke-width="2.4" stroke-linejoin="round"/>
  <circle cx="500" cy="138" r="5" fill="none" stroke="#4f64e1" stroke-width="2.4"/>
  <line x1="500" y1="143" x2="500" y2="152" stroke="#4f64e1" stroke-width="2.4" stroke-linecap="round"/>
  <text x="500" y="196" text-anchor="middle" font-size="16" font-weight="700" fill="#0e1124">Your VPS</text>
  <text x="500" y="218" text-anchor="middle" font-size="12" fill="#4040d8">WireGuard server</text>
  <text x="500" y="235" text-anchor="middle" font-size="12" fill="#4040d8">paid in crypto, no KYC</text>

  <!-- CARD C: Internet -->
  <rect x="770" y="96" width="210" height="150" rx="14" fill="#ffffff" stroke="rgba(14,17,36,0.12)" stroke-width="1.5"/>
  <circle cx="875" cy="142" r="24" fill="none" stroke="#0e1124" stroke-width="2.2"/>
  <ellipse cx="875" cy="142" rx="10" ry="24" fill="none" stroke="#0e1124" stroke-width="2.2"/>
  <line x1="851" y1="142" x2="899" y2="142" stroke="#0e1124" stroke-width="2.2"/>
  <line x1="855" y1="130" x2="895" y2="130" stroke="#0e1124" stroke-width="2.2"/>
  <line x1="855" y1="154" x2="895" y2="154" stroke="#0e1124" stroke-width="2.2"/>
  <text x="875" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#0e1124">Internet</text>
  <text x="875" y="222" text-anchor="middle" font-size="12" fill="#6b6d7f">sees the server IP</text>

  <!-- Arrow A -> B (encrypted tunnel) -->
  <text x="312" y="150" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4f64e1">encrypted tunnel</text>
  <line x1="232" y1="171" x2="389" y2="171" stroke="#4f64e1" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#wg-arrow)"/>

  <!-- Arrow B -> C -->
  <text x="688" y="150" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4f64e1">forwards traffic</text>
  <line x1="607" y1="171" x2="764" y2="171" stroke="#4f64e1" stroke-width="2.2" marker-end="url(#wg-arrow)"/>

  <!-- Return note -->
  <text x="500" y="290" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b6d7f">websites never see your real IP address</text>
</svg>
