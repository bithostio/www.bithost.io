<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" role="img" aria-labelledby="ssh-title ssh-desc" font-family="'Helvetica Neue', Arial, sans-serif">
  <title id="ssh-title">How an SSH key connects your computer to your bithost server</title>
  <desc id="ssh-desc">A flow diagram. Your computer holds the private SSH key. The matching public key is stored on your bithost server. When you run the ssh command, the two keys are matched over an encrypted connection and you get a root terminal on the server — no password needed.</desc>

  <defs>
    <marker id="ssh-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4f64e1"/>
    </marker>
  </defs>

  <!-- Caption -->
  <text x="500" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#0e1124">SSH key authentication — no password needed</text>
  <text x="500" y="60" text-anchor="middle" font-size="12.5" fill="#6b6d7f">your private key stays on your machine; the public key lives on the server</text>

  <!-- CARD A: Your computer -->
  <rect x="20" y="96" width="220" height="150" rx="14" fill="#ffffff" stroke="rgba(14,17,36,0.12)" stroke-width="1.5"/>
  <rect x="98" y="120" width="64" height="42" rx="5" fill="none" stroke="#0e1124" stroke-width="2.2"/>
  <line x1="110" y1="170" x2="150" y2="170" stroke="#0e1124" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="130" y1="162" x2="130" y2="170" stroke="#0e1124" stroke-width="2.2"/>
  <text x="130" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#0e1124">Your computer</text>
  <text x="130" y="222" text-anchor="middle" font-size="12" fill="#4040d8">private key (id_ed25519)</text>

  <!-- CARD B: SSH key match -->
  <rect x="390" y="84" width="220" height="174" rx="14" fill="#ececfe" stroke="#4f64e1" stroke-width="2"/>
  <path d="M474 150 a18 18 0 1 0 8 -15" fill="none" stroke="#4f64e1" stroke-width="2.4"/>
  <line x1="486" y1="150" x2="524" y2="150" stroke="#4f64e1" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="516" y1="150" x2="516" y2="160" stroke="#4f64e1" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="524" y1="150" x2="524" y2="162" stroke="#4f64e1" stroke-width="2.4" stroke-linecap="round"/>
  <text x="500" y="196" text-anchor="middle" font-size="16" font-weight="700" fill="#0e1124">SSH</text>
  <text x="500" y="218" text-anchor="middle" font-size="12" fill="#4040d8">encrypted key match</text>
  <text x="500" y="235" text-anchor="middle" font-size="12" fill="#4040d8">over port 22</text>

  <!-- CARD C: Server -->
  <rect x="760" y="96" width="220" height="150" rx="14" fill="#ffffff" stroke="rgba(14,17,36,0.12)" stroke-width="1.5"/>
  <rect x="840" y="120" width="60" height="15" rx="3.5" fill="none" stroke="#0e1124" stroke-width="2"/>
  <rect x="840" y="140" width="60" height="15" rx="3.5" fill="none" stroke="#0e1124" stroke-width="2"/>
  <circle cx="849" cy="127.5" r="2" fill="#0e1124"/>
  <circle cx="849" cy="147.5" r="2" fill="#0e1124"/>
  <text x="870" y="186" text-anchor="middle" font-size="16" font-weight="700" fill="#0e1124">Your server</text>
  <text x="870" y="208" text-anchor="middle" font-size="12" fill="#6b6d7f">public key in</text>
  <text x="870" y="224" text-anchor="middle" font-size="12" fill="#6b6d7f">authorized_keys</text>

  <!-- Arrow A -> B -->
  <text x="315" y="158" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4f64e1">ssh root@IP</text>
  <line x1="242" y1="171" x2="384" y2="171" stroke="#4f64e1" stroke-width="2.2" marker-end="url(#ssh-arrow)"/>

  <!-- Arrow B -> C -->
  <text x="685" y="158" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4f64e1">keys match</text>
  <line x1="612" y1="171" x2="754" y2="171" stroke="#4f64e1" stroke-width="2.2" marker-end="url(#ssh-arrow)"/>

  <!-- Return: root shell -->
  <text x="500" y="290" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b6d7f">you land in a root terminal on the server</text>
</svg>
