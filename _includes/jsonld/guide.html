{% if page.schema_type == 'Article' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "@id": "{{ page.canonical }}#article",
  "headline": "{{ page.h1 }}",
  "description": "{{ page.description }}",
  "publisher": { "@id": "https://bithost.io/#organization" },
  "url": "{{ page.canonical }}",
  "inLanguage": "en"
}
</script>
{% else %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "@id": "{{ page.canonical }}#howto",
  "name": "{{ page.h1 }}",
  "description": "{{ page.description }}",
  "step": [
  ]
}
</script>
{% endif %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://bithost.io/" },
    { "@type": "ListItem", "position": 2, "name": "Guides", "item": "https://bithost.io/guides/" },
    { "@type": "ListItem", "position": 3, "name": "{{ page.h1 }}", "item": "{{ page.canonical }}" }
  ]
}
</script>
