<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "@id": "https://bithost.io/accepted-cryptocurrencies#webpage",
    "name": "Accepted Cryptocurrencies — bithost",
    "description": "Every cryptocurrency bithost accepts — 300+ coins and tokens including Bitcoin, Ethereum, USDT, USDC, Monero, and Solana. No KYC, no card.",
    "url": "https://bithost.io/accepted-cryptocurrencies/",
    "publisher": { "@id": "https://bithost.io/#organization" },
    "inLanguage": "en",
    "breadcrumb": {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://bithost.io/" },
        { "@type": "ListItem", "position": 2, "name": "Pay with Crypto", "item": "https://bithost.io/pay-with-crypto/" },
        { "@type": "ListItem", "position": 3, "name": "Accepted Cryptocurrencies", "item": "https://bithost.io/accepted-cryptocurrencies/" }
      ]
    }
  }
</script>
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "Cryptocurrencies accepted by bithost",
    "description": "All cryptocurrencies and tokens accepted by bithost for VPS hosting payment.",
    "url": "https://bithost.io/accepted-cryptocurrencies/",
    "numberOfItems": {{ site.data.coins | size }},
    "itemListOrder": "https://schema.org/ItemListUnordered",
    "itemListElement": [
      {% for c in site.data.coins %}{ "@type": "ListItem", "position": {{ forloop.index }}, "name": {{ c.name | jsonify }}, "alternateName": {{ c.symbol | jsonify }} }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ]
  }
</script>
