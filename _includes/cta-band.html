<!-- CTA BAND -->
<section style="
  background: var(--rd-hero-bg);
  color: var(--rd-hero-fg);
  position: relative;
  overflow: hidden;
  padding: 96px 56px;
  text-align: center;
  border-top: 1px solid var(--rd-navy-3);
">
  <div aria-hidden="true" style="
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--rd-hero-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--rd-hero-grid) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, #000 30%, transparent 85%);
    -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, #000 30%, transparent 85%);
  "></div>

  <div style="position: relative; max-width: 720px; margin: 0 auto;">      <h2 style="
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: -0.02em;
      color: var(--rd-hero-fg);
      margin: 0 0 24px;
    ">Top up in crypto.<br>Be root in a minute.</h2>

    <p style="
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--rd-hero-mute);
      max-width: 480px;
      margin: 0 auto 40px;
    ">No cards. No KYC. Uninterrupted service since 2014. For people who'd rather not explain why they need a server.</p>

    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
      <a class="rd-btn solid lg" href="https://dashboard.bithost.io/registration">Deploy a server &rarr;</a>
    </div>
  </div>
</section>
